# Server Config
server.port=8080

# Database Configuration (H2 In-Memory Database for ease of development)
spring.datasource.url=jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console Configuration (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA & Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration Properties
chatapp.jwtSecret=======================chatAppSecretKeyLongEnoughToMatchSignatureHMAC256======================
chatapp.jwtExpirationMs=86400000

